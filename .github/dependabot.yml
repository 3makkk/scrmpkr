# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── docker ──────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # ── npm ─────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Named groups batch related packages into a single PR.
      # Named groups are listed first so they take priority over the
      # catch-all update-type groups below (Dependabot assigns a dependency
      # to the first matching group).
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      storybook:
        patterns:
          - "@storybook/*"
          - storybook
      # Catch-all groups organized by semver level – collect any remaining
      # packages not matched by a named group above.
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
      major-updates:
        update-types:
          - "major"
